services:
  postgres:
    image: postgres:16-alpine
    container_name: colegio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: colegio_db
    ports:
      - "5432:5432"
    volumes:
      - colegio_pg_data:/var/lib/postgresql/data

volumes:
  colegio_pg_data:
